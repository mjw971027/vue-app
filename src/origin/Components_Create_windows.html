<!DOCTYPE html>


<head>
    <meta charset="UTF-8">
    <title>工装申请弹窗</title>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=9;IE=8;IE=7;IE=6;IE=EDGE"/>

    <script src="../../lib/nui/jquery/jquery-1.6.2.min.js" type="text/javascript"></script>
    <script src="../../lib/jquery/jquery.form.js" type="text/javascript"></script>
    <script src="../../js/boot.js" type="text/javascript"></script>
    <script src="../../js/date-util.js" type="text/javascript"></script>
    <script src="../../js/common.js" type="text/javascript"></script>
    <script src="../../js/doc/window/CreateWindow.js" type="text/javascript"></script>
</head>
<style>
    html,
    body {
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
    }
    .toolbar{
        font-size: 15px;
        font-weight: bold;
    }
</style>
<body>
<div class="mini-toolbar">
    <span class="toolbar">工装申请</span>
</div>
<table style="width: 100%;">
    <tr>
        <th style="width: 100px;">申请编号</th>
        <td>
            <input id="txtAppNo" class="mini-textbox" style="width: 150px" enabled="false">
        </td>
        <th style="width: 100px;">公司主体</th>
        <td><input id="txtCom" class="mini-textbox" style="width: 150px" enabled="false">
        </td>
        <th style="width: 100px;">部门</th>
        <td><input id="txtDept"class="mini-textbox" style="width: 150px" enabled="false">
        </td>
        <th style="width: 100px;">申请人</th>
        <td><input id="txtAppUser" class="mini-textbox" style="width: 150px"enabled="false">
        </td>
        <th style="width: 100px;">申请日期</th>
        <td><input id="dateApp" class="mini-datepicker" style="width: 150px" enabled="false">
        </td>
    </tr>
    <tr>
        <th>工程号</th>
        <td><div class="mini-combobox" id="cmbProjNo" popupWidth="400" textField="code" valueField="code" url="../../projectManager/qryAllProjNo"
                  style="width: 150px;" allowInput="true" valueFromSelect="true" >
            <div property="columns">
                <div header="工程号" width="25%" field="code" headerAlign="center" align="left"></div>
                <div header="工程号描述(中文)" width="75%" field="description" headerAlign="center" align="left"></div>
            </div>
        </div>
        </td>
        <th><span style="color:red;">*</span>工装类别</th>
        <td><div class="mini-combobox" id="cmbDiv" popupWidth="400" textField="text" valueField="id" data="[{id:'01',text:'生产通用'},{id:'02',text:'生产专用'},{id:'03',text:'安措'}
        ,{id:'04',text:'科研通用'},{id:'05',text:'科研专用'}]"
                  style="width: 150px;" allowInput="true" valueFromSelect="true" >
        </div>

        </td>
        <th><span style="color:red;">*</span>需求数</th>
        <td><input id="txtNeedSum" class="mini-textbox" style="width: 150px">
        </td>
        <th>联系方式</th>
        <td><input id="txtTel"class="mini-textbox" style="width: 150px">
        </td>
        <th><span style="color:red;">*</span>需求日期</th>
        <td><input id="dateNeed"class="mini-datepicker" style="width: 150px">
        </td>
    </tr>
    <tr>
        <th>图号</th>
        <td><input id="txtDwg" class="mini-textbox" style="width: 150px" enabled="false"></td>
        <th>材料费用/元</th>
        <td><input id="txtMaterialCost" class="mini-textbox" style="width: 150px" enabled="false"></td>
        <th>最终下发数</th>
        <td><input id="txtLastIss" class="mini-textbox" style="width: 150px" enabled="false"></td>
        <th>预估工时/小时</th>
        <td><input id="txtLaborHour" class="mini-textbox" style="width: 150px" enabled="false"></td>
<!--        <th>是否需要领导审批</th>-->
<!--        <td><input id="radioAidot" class="mini-radiobuttonlist" style="width: 150px" textField="text" valueField="id"-->
<!--        data="[{'id':'Y','text':'是'},{'id':'N','text':'否'}]"></td>-->
    </tr>
    <tr>
        <th><span style="color:red;">*</span>项目名称</th>
        <td colspan="9"><input id="txtProgram" class="mini-textbox" style="width:100%"></td>

    </tr>
    <tr>
        <th>备注</th>
        <td colspan="9" style="height: 100px;">
            <div id="txtRemark" class="mini-textarea" style="width: 100%;height: 100%"></div>
        </td>
    </tr>
</table>

<div id="dataGrid1" class="mini-datagrid" style="width:100%;height:200px;"
     borderStyle="border:top"
     idField="guid" allowResize="false"
     borderStyle="border:none"
     dataField="list"
     showToolbar="true"
     showPager="false"
     multiSelect="false"
     allowCellEdit="true"
     allowCellSelect="true"
     editNextOnEnterKey="true"
     allowSortColumn="false"
     selectOnLoad="true"
     allowHeaderWrap="true"
>
    <div property="toolbar">
        <div class="mini-toolbar" style="align-items: center;display:flex;justify-content: space-between">
            <span class="toolbar" style="float: left">申请材料</span>
            <div style="float: right">
                <button id="btnAppAdd" iconCls="icon-add" class="mini-button" style="margin-left: 500px">新增</button>
                <button id="btnAppDel" iconCls="icon-remove" class="mini-button" style="padding-left: 10px">删除</button>
            </div>

        </div>
    </div>
    <div property="columns">
        <div type="indexcolumn" headerAlign="center" width="20">序号</div>
        <div type="checkboxcolumn"field="activation"  trueValue="Y" falseValue="N" value="Y" enabled="false" headerAlign="center" align="center" width="50">是否有效</div>



        <div field="materialNo" width="60" headerAlign="center" align="center"allowSort="true">
            物资编码</div>
        <div field="materialName" width="100" headerAlign="center"align="center" allowSort="true">
            <input property="editor" class="mini-textbox" style="width: 100%;"/>
            <span style="color:red;">*</span>物资描述</div>
        <div field="unit" width="50" renderer="onGenderRenderer" headerAlign="center" displayField="unitDesc" align="center">
            <input property="editor" class="mini-combobox" textField="UNT_DESC" valueField="GUID"
                   style="width:150px;height:24px;display:inline-block;vertical-align: middle"
                   multiSelect="false" url="../../components/getUnit"
                   popupWidth="250"/>
            <span style="color:red;">*</span>单位
        </div>
        <div field="demandQty" align="center" width="50" allowSort="true" headerAlign="center">
            <input property="editor" class="mini-textbox" style="width: 100%;"/>


            <span style="color:red;">*</span>需求数
        </div>
        <div field="finalDemandQty" align="center" width="50" allowSort="true" headerAlign="center">
            最终需求数
        </div>
        <div field="materialCost" align="center" width="50" allowSort="true" headerAlign="center">
            <input property="editor" class="mini-textbox" style="width: 100%;"/>


            预估金额/元
        </div>
        <div field="materialSources" align="center" width="50" allowSort="true" headerAlign="center" displayField="materialSourcesDesc" >
            <input property="editor" class="mini-combobox" textField="text" valueField="id" url="../../components/selectMatS"
                   style="width:150px;height:24px;display:inline-block;vertical-align: middle"
                   multiSelect="false"
                   popupWidth="250"/>
            <span style="color:red;">*</span>物资来源
        </div>
        <div field="remark" align="center" width="50" allowSort="true" headerAlign="center">
            <input property="editor" class="mini-textbox" style="width: 100%;"/>

            备注
        </div>
        <div field="quality" align="center" width="50" allowSort="true" headerAlign="center" displayField="qualityDesc">
            <input property="editor" class="mini-combobox" textField="DESCRIPTION" valueField="GUID"
                   style="width:150px;height:24px;display:inline-block;vertical-align: middle"
                   multiSelect="false" url="../../components/getQuality"
                   popupWidth="250"/>
            材质
        </div>
        <div field="thk1" align="center" width="50" allowSort="true" headerAlign="center">
            <input property="editor" class="mini-textbox" style="width: 100%;"/>

            T1
        </div>
        <div field="thk2" align="center" width="50" allowSort="true" headerAlign="center">
            <input property="editor" class="mini-textbox" style="width: 100%;"/>

            T2
        </div>
        <div field="w1" align="center" width="50" allowSort="true" headerAlign="center">
            <input property="editor" class="mini-textbox" style="width: 100%;"/>

            B1
        </div>
        <div field="w2" align="center" width="50" allowSort="true" headerAlign="center">
            <input property="editor" class="mini-textbox" style="width: 100%;"/>

            B2
        </div>
        <div field="l" align="center" width="60" allowSort="true" headerAlign="center">
            <input property="editor" class="mini-textbox" style="width: 100%;"/>

            L
        </div>
    </div>
</div>


<div class="mini-fit">
    <div id="dataGrid2" class="mini-datagrid" style="width:50%;height:100%;float: left;"
         borderStyle="border:top"
         allowResize="false"
         showPager="false"
         idField="id" allowResize="false"
         sizeList="[300,500,1000]" pageSize="300"
         showHearder="false"
         showToolbar="true"
         multiSelect="false"
    >
        <div property="toolbar" >
            <div class="mini-toolbar" style="align-items: center;display:flex;justify-content: space-between;height: 24px;">
                <span class="toolbar" style="float: left">附件信息</span>
                <div style="float: right">
                    <button id="btnUpload" iconCls="icon-upload" class="mini-button"style="margin-left: 300px">上传</button>
                    <button id="btnFileDel" iconCls="icon-remove" class="mini-button" style="padding-left: 10px">删除</button>
                </div>

            </div>
        </div>
        <div property="columns">
            <div type="indexcolumn" headerAlign="center" width="20">序号</div>


            <div field="fileName" name="fileName" width="150" headerAlign="center" allowSort="true" align="center">文件名称</div>
            <div field="fileType" width="50" headerAlign="center" allowSort="true" align="center">附件类型</div>
            <div field="createDate" width="50" renderer="onGenderRenderer" headerAlign="center" align="center"dateFormat="yyyy-MM-dd">上传日期
            </div>
            <div field="createUserId"  width="50" allowSort="true" headerAlign="center"align="center">
                上传人
            </div>
        </div>

    </div>
    <div id="dataGrid3" class="mini-datagrid" style="width:50%;height:100%;float: right"
         borderStyle="border:top"
         allowResize="false"
         showPager="false"
         idField="id" allowResize="false"
         sizeList="[300,500,1000]" pageSize="300"
         showHeader="false"
         showToolbar="true"
         multiSelect="false"
    >
        <div property="toolbar">
            <div class="mini-toolbar" style="height: 24px;display:flex;align-items: center">
                <span class="toolbar">审批过程记录</span>

            </div>
        </div>
        <div property="columns">
            <div type="indexcolumn" headerAlign="center" width="20">序号</div>


            <div field="createUserId" width="60" headerAlign="center" allowSort="true">审核人</div>
            <div field="opinion" width="100" headerAlign="center" allowSort="true">审核意见</div>
            <div field="stepName" width="50" renderer="onGenderRenderer" headerAlign="center">审核节点
            </div>
            <div field="menuName" align="right" width="50" allowSort="true" headerAlign="center">
                审核结果
            </div>
            <div field="createDate" align="right" width="50" allowSort="true" headerAlign="center" dateFormat="yyyy-MM-dd">
                审核时间
            </div>
        </div>
    </div>
</div>
<div class="mini-toolbar" style="text-align: center;height: 24px">
    <button id="btnSave" iconCls="icon-save" class="mini-button">保存</button>
    <button id="btnCommit" iconCls="icon-ok" class="mini-button">提交</button>

    <span style="display:none;">选择审批人</span>
    <div id="combReviewer" style="display:none;"class="mini-combobox"></div>


</div>
<div id="importFileWindow" class="mini-window" title="上传附件" style="width:510px;"
     showModal="true" allowResize="false" allowDrag="true">
    <form id="importForm" name="importForm" action="" enctype="multipart/form-data" method="post">
        <span style="margin-left: 10px">文件名:</span>
        <input id="fileSelectInput" name="file" class="mini-htmlfile" required="true" width="350px"
               RequiredErrorText="请选择文件" buttonText="选择"/>
        <a class="mini-button" iconCls="icon-ok" id="btnImportOk">上传附件</a>
    </form>
</div>
</body>
</html>
