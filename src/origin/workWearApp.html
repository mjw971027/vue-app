<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>工装申请1</title>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=9;IE=8;IE=7;IE=6;IE=EDGE"/>

    <script src="../lib/nui/jquery/jquery-1.6.2.min.js" type="text/javascript"></script>
    <script src="../js/boot.js" type="text/javascript"></script>
    <script src="../lib/jquery/jquery.form.js" type="text/javascript"></script>
    <script src="../js/loadData.js" type="text/javascript"></script>
    <script src="../js/common.js" type="text/javascript"></script>
    <script type="text/javascript" src="../js/doc/workWearApp.js"></script>
    <style type="text/css">
        html, body {
            margin: 0;
            padding: 0;
            border: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .tableCls td {
            text-align: right;
            padding-left: 0px;
        }

        i {
            font-style: normal;
            font-weight: bold;
            color: #4831a5;
        }
    </style>
</head>
<body>
<div class="mini-toolbar" borderStyle="border:none">
    <!--        <div style="display: flex;flex-direction: column">-->
    <table class="tableCls">
        <tr>
            <td style="padding-left: 4px">公司主体</td>
            <td><input id="cbbCompany" class="mini-combobox" url="../comp/getComps"
                       textField="descChn" valueField="code"
                       style="width:250px;"/></td>
            <td style="padding-left: 4px">申请部门</td>
            <td><input class="mini-combobox" id="cbbDepartment" textField="orgnDesc" valueField="orgnCd"
                       showNullItem="true"
                       allowInput="true" valueFromSelect="true"/></td>
            <td style="padding-left: 4px">工程号</td>
            <td>
                <div class="mini-combobox" id="cmbProjNo" popupWidth="400" textField="code" valueField="code"
                     url="../projectManager/qryAllProjNo" showNullItem="true"
                      width="90" allowInput="true" valueFromSelect="true" >
                    <div property="columns">
                        <div header="工程号" width="25%" field="code" headerAlign="center" align="left"></div>
                        <div header="工程号描述(中文)" width="75%" field="description" headerAlign="center"
                             align="left"></div>
                    </div>
                </div>
            </td>
            <td style="padding-left: 4px">申请状态</td>
            <td>
                <div id="cmbStatus" style="width:100px" class="mini-combobox" showNullItem="true"
                     data="[{id:'01',text:'编制'},{id:'02',text:'审批'},{id:'04',text:'设计出图'},{id:'05',text:'设计出图审批'},{id:'03',text:'完成'},{id:'00',text:'退回'}]"></div>
            </td>
        </tr>
        <tr>
            <td style="padding-left: 4px">申请日期</td>
            <td><input id="date1" style="width:123px" class="mini-datepicker" format="yyyy-MM-dd" required="true"/>
                <input id="date2" style="width:123px" value="new Date()" class="mini-datepicker" format="yyyy-MM-dd"
                       required="true"/></td>

            <td style="padding-left: 4px">项目名称/申请单号</td>
            <td colspan="3"><input id="txtProNameNo" style="width:260px" class="mini-textbox"/></td>

        </tr>

        <!--    </div>-->
    </table>
</div>
<div class="mini-toolbar" style="border-bottom: none;">
    <div class="mini-button" iconCls="icon-search" id="btnSearch">查询</div>
    <div class="mini-button" iconCls="icon-add" id="btnAdd">新增</div>
    <div class="mini-button" iconCls="icon-remove" id="btnDel">删除</div>
    <div class="mini-button" iconCls="icon-undo" id="btnRetract">撤回</div>
    <div class="mini-button" iconCls="icon-print" id="btnPrint">打印</div>
</div>
<div class="mini-fit">
    <div id="dataGrid1" class="mini-datagrid" style="width:100%;height:100%;"
         borderStyle="border:top"
         allowResize="false"
         showPager="true"
         dataField="list" allowResize="false"
         sizeList="[50,100,200]" pageSize="50"
         showToolbar="true"
         multiSelect="false"
    >
        <div property="columns">
            <div type="indexcolumn" headerAlign="center" width="20">序号</div>

            <div name="billNo" headerAlign="center" align="center" width="100">申请单号</div>

            <div field="componentsName" width="200" headerAlign="center" allowSort="true">
                项目名称
            </div>
            <div field="projNo" width="100" headerAlign="center" allowSort="true">
                工程号
            </div>
            <div field="deptDesc" width="50" renderer="onGenderRenderer" headerAlign="center">

                申请部门
            </div>
            <div field="appUser" align="center" width="50" allowSort="true" headerAlign="center">


                申请人
            </div>
            <div field="divDesc" align="center" width="50" allowSort="true" headerAlign="center">

                工装类别
            </div>
            <div field="finalNumberNo" align="center" width="50" allowSort="true" headerAlign="center">
                最终审核数


            </div>
            <div field="maStatusDesc" align="center" width="50" allowSort="true" headerAlign="center">

                申请状态
            </div>
            <div field="status" name="status" align="center" width="50" allowSort="true" headerAlign="center">

                申请状态流程跟踪
            </div>
            <div field="createDate" align="center" width="50" allowSort="true" headerAlign="center"
                 dateFormat="yyyy-MM-dd">

                创建时间
            </div>
        </div>
    </div>
</div>
<div id="createWindow" class="mini-window" title="新增项目" style="width:700px;height: 100px"
     showModal="true" allowResize="false" allowDrag="true">
    <div style="margin-bottom: 4px">
        <span>项目名称：</span>
        <div id="txtProgram" class="mini-textbox" style="width: 620px;"></div>
    </div>


    <div class="mini-toolbar" style="text-align: center">
        <button class="mini-button" id="btnCreate">创建</button>
        <button class="mini-button" id="btnCancelCreate">取消</button>
    </div>
</div>
</body>
</html>
